version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: vaultmanager
      POSTGRES_USER: vaultmgr
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vault-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vaultmgr:changeme@postgres:5432/vaultmanager
      SECRET_KEY: dev_secret_key
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - vault-net

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - vault-net

volumes:
  postgres_data:


networks:
  vault-net:
